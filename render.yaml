services:
  - type: web
    name: stockguard
    runtime: python
    buildCommand: pip install fastapi uvicorn pydantic && pip install -e .
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STOCKGUARD_DATA
        value: /tmp/inventory.json
      - key: STOCKGUARD_SUPPLIERS
        value: /tmp/suppliers.json
    healthCheckPath: /