name: CI

on:
  push:
    branches: ["main", "develop", "entrega-intermediaria"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint & Testes
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      PYTHONPATH: src

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar dependências de desenvolvimento
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint com Ruff (src e tests)
        run: ruff check src/ tests/

      - name: Verificar formatação com Ruff
        run: ruff format --check src/ tests/

      - name: Testes unitários e de integração (mock — sem internet)
        run: pytest --ignore=tests/test_suppliers_integration.py -v --cov=src --cov-report=term-missing

      - name: Testes de integração com mock do ViaCEP
        run: pytest tests/test_suppliers_integration.py -v

      - name: Testes de integração real com ViaCEP
        if: github.ref == 'refs/heads/main'
        run: pytest -m integration tests/test_suppliers_integration.py -v
        continue-on-error: true