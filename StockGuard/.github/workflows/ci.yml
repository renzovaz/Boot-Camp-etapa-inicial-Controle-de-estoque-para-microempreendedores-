name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint + Testes (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependências de desenvolvimento
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint com Ruff (verificação de erros)
        run: ruff check src/ tests/

      - name: Lint com Ruff (verificação de formatação)
        run: ruff format --check src/ tests/

      - name: Executar testes com cobertura
        run: pytest --cov=stockguard --cov-report=term-missing

      - name: Verificar versão da aplicação
        run: python -c "import stockguard; print('StockGuard v' + stockguard.__version__)"